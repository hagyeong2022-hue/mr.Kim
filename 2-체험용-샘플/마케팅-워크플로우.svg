<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" width="960" height="260" font-family="'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000022"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="260" fill="#f8fafc" rx="16"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b" letter-spacing="0.5">마케팅 업무 흐름</text>

  <!-- Arrows between boxes -->
  <line x1="162" y1="145" x2="188" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="338" y1="145" x2="364" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="514" y1="145" x2="540" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="145" x2="716" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 1: 기획 -->
  <g filter="url(#shadow)">
    <rect x="28" y="75" width="134" height="140" rx="16" fill="url(#g1)"/>
  </g>
  <!-- Icon: lightbulb -->
  <circle cx="95" cy="118" r="22" fill="rgba(255,255,255,0.2)"/>
  <text x="95" y="126" text-anchor="middle" font-size="24" fill="white">💡</text>
  <text x="95" y="167" text-anchor="middle" font-size="16" font-weight="700" fill="white">기획</text>
  <text x="95" y="186" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">전략 · 목표 수립</text>
  <text x="95" y="200" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">타깃 분석</text>

  <!-- Step 2: 콘텐츠 제작 -->
  <g filter="url(#shadow)">
    <rect x="204" y="75" width="134" height="140" rx="16" fill="url(#g2)"/>
  </g>
  <circle cx="271" cy="118" r="22" fill="rgba(255,255,255,0.2)"/>
  <text x="271" y="126" text-anchor="middle" font-size="24" fill="white">✏️</text>
  <text x="271" y="167" text-anchor="middle" font-size="16" font-weight="700" fill="white">콘텐츠 제작</text>
  <text x="271" y="186" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">글 · 영상 · 이미지</text>
  <text x="271" y="200" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">소재 제작</text>

  <!-- Step 3: 검토 -->
  <g filter="url(#shadow)">
    <rect x="380" y="75" width="134" height="140" rx="16" fill="url(#g3)"/>
  </g>
  <circle cx="447" cy="118" r="22" fill="rgba(255,255,255,0.2)"/>
  <text x="447" y="126" text-anchor="middle" font-size="24" fill="white">🔍</text>
  <text x="447" y="167" text-anchor="middle" font-size="16" font-weight="700" fill="white">검토</text>
  <text x="447" y="186" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">품질 · 브랜드 확인</text>
  <text x="447" y="200" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">승인 프로세스</text>

  <!-- Step 4: 배포 -->
  <g filter="url(#shadow)">
    <rect x="556" y="75" width="134" height="140" rx="16" fill="url(#g4)"/>
  </g>
  <circle cx="623" cy="118" r="22" fill="rgba(255,255,255,0.2)"/>
  <text x="623" y="126" text-anchor="middle" font-size="24" fill="white">🚀</text>
  <text x="623" y="167" text-anchor="middle" font-size="16" font-weight="700" fill="white">배포</text>
  <text x="623" y="186" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">SNS · 이메일 · 광고</text>
  <text x="623" y="200" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">채널 발행</text>

  <!-- Step 5: 성과 분석 -->
  <g filter="url(#shadow)">
    <rect x="732" y="75" width="200" height="140" rx="16" fill="url(#g5)"/>
  </g>
  <circle cx="832" cy="118" r="22" fill="rgba(255,255,255,0.2)"/>
  <text x="832" y="126" text-anchor="middle" font-size="24" fill="white">📊</text>
  <text x="832" y="167" text-anchor="middle" font-size="16" font-weight="700" fill="white">성과 분석</text>
  <text x="832" y="186" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">KPI · ROI 측정</text>
  <text x="832" y="200" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.85)">인사이트 도출</text>

  <!-- Step numbers -->
  <circle cx="47" cy="94" r="11" fill="rgba(255,255,255,0.3)"/>
  <text x="47" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>
  <circle cx="223" cy="94" r="11" fill="rgba(255,255,255,0.3)"/>
  <text x="223" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>
  <circle cx="399" cy="94" r="11" fill="rgba(255,255,255,0.3)"/>
  <text x="399" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>
  <circle cx="575" cy="94" r="11" fill="rgba(255,255,255,0.3)"/>
  <text x="575" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="white">4</text>
  <circle cx="751" cy="94" r="11" fill="rgba(255,255,255,0.3)"/>
  <text x="751" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="white">5</text>

  <!-- Feedback loop arrow -->
  <path d="M 832,215 Q 832,245 480,245 Q 128,245 95,215" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="480" y="242" text-anchor="middle" font-size="10" fill="#94a3b8">피드백 루프</text>
</svg>
